name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_args: --bundles none
            asset_path: src-tauri/target/x86_64-pc-windows-msvc/release/ezcut.exe
            asset_suffix: windows-x64
          - os: macos-15-intel
            rust_target: x86_64-apple-darwin
            bundle_args: --bundles app
            asset_suffix: macos-x64
          - os: macos-14
            rust_target: aarch64-apple-darwin
            bundle_args: --bundles app
            asset_suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5" --locked

      - name: Build release
        run: cargo tauri build --target ${{ matrix.rust_target }} ${{ matrix.bundle_args }}
        working-directory: src-tauri

      - name: Set asset name
        shell: bash
        run: |
          echo "ASSET_NAME=EZCut-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip" >> "$GITHUB_ENV"

      - name: Pack Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.asset_path }}" -DestinationPath "$env:ASSET_NAME" -Force

      - name: Locate macOS app bundle
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$(find src-tauri/target -type d -name 'EZCut.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No EZCut.app bundle was found under src-tauri/target"
            find src-tauri/target -maxdepth 6 -type d | sort
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Pack macOS asset
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ASSET_NAME"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET_NAME }}

