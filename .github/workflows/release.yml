name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: crack-windows-x64
            artifact_path: src-tauri/target/release/crack.exe
            archive_name: crack-windows-x64.zip
            rust_target: x86_64-pc-windows-msvc
          - os: macos-13
            artifact_name: crack-macos-x64
            artifact_path: src-tauri/target/release/bundle/macos/crack.app
            archive_name: crack-macos-x64.zip
            rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: |
          echo "No frontend package manager dependencies required."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeRelease: false
          args: --target ${{ matrix.rust_target }}

      - name: Prepare Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Prepare macOS archive
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.artifact_path }}" "${{ matrix.archive_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.archive_name }}
