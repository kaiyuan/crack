name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_args: --bundles none
            asset_path: src-tauri/target/x86_64-pc-windows-msvc/release/crack.exe
            asset_name: crack-windows-x64.zip
          - os: macos-13
            rust_target: x86_64-apple-darwin
            bundle_args: --bundles app
            asset_path: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/crack.app
            asset_name: crack-macos-x64.zip
          - os: macos-14
            rust_target: aarch64-apple-darwin
            bundle_args: --bundles app
            asset_path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/crack.app
            asset_name: crack-macos-arm64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5" --locked

      - name: Build release
        run: cargo tauri build --target ${{ matrix.rust_target }} ${{ matrix.bundle_args }}
        working-directory: src-tauri

      - name: Pack Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.asset_path }}" -DestinationPath "${{ matrix.asset_name }}" -Force

      - name: Pack macOS asset
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.asset_path }}" "${{ matrix.asset_name }}"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.asset_name }}
